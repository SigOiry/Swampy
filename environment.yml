name: SwampySim
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - scipy
  - pandas
  - netcdf4
  - rasterio
  - fiona
  - shapely
  - pyproj
  - spectral
  - pillow
  - dicttoxml
  - xmltodict
  - future
  - xlrd
  - tqdm
  - numba
  - tk  # tkinter for the GUI
  # Optional: if you hit proj/gdal conflicts on Windows, try pinning
  # - gdal
  # - proj
